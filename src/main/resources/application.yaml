server:
  port: ${PORT:8080}

spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nanoledger}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234} # Usar variable de entorno, fallback a 1234 localmente
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:49a2b5e7d8f9c1a3b2e4d6f8a0c5b7e9f1d3a5c7e9b2d4f6a8c0e2b4d6f8a0c2} # Usar variable de entorno, fallback a un hash seguro localmente