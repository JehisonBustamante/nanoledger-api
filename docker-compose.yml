services:
  postgres:
    image: 'postgres:latest'
    container_name: nanoledger-db
    environment:
      - 'POSTGRES_DB=nanoledger'
      - 'POSTGRES_PASSWORD=1234'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
